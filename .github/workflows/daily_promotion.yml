name: BroadFSC Pre-Market Briefing

on:
  schedule:
    # Run every 30 minutes to catch all global market openings
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  pre-market-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests groq

      - name: Run pre-market briefing
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_CHANNEL_ES: ${{ secrets.TELEGRAM_CHANNEL_ES }}
          TELEGRAM_CHANNEL_AR: ${{ secrets.TELEGRAM_CHANNEL_AR }}
        run: python daily_promotion.py
