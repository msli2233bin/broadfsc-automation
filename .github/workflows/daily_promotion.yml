name: BroadFSC Pre-Market Briefing

on:
  schedule:
    # APAC: 00:00 UTC (08:00 Beijing)
    - cron: '0 0 * * 1-5'
    # Middle East: 05:30 UTC (13:30 Beijing)
    - cron: '30 5 * * 1-5'
    # Europe: 07:00 UTC (15:00 Beijing)
    - cron: '0 7 * * 1-5'
    # Americas: 13:30 UTC (21:30 Beijing)
    - cron: '30 13 * * 1-5'
  workflow_dispatch:

jobs:
  pre-market-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests groq

      - name: Run pre-market briefing
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_CHANNEL_ES: ${{ secrets.TELEGRAM_CHANNEL_ES }}
          TELEGRAM_CHANNEL_AR: ${{ secrets.TELEGRAM_CHANNEL_AR }}
          TELEGRAM_CHANNEL_JP: ${{ secrets.TELEGRAM_CHANNEL_JP }}
          TELEGRAM_CHANNEL_ZH_TW: ${{ secrets.TELEGRAM_CHANNEL_ZH_TW }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: python daily_promotion.py
