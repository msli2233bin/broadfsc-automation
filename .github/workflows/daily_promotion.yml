name: BroadFSC Daily AI Promotion

on:
  schedule:
    # 每天 UTC 08:00（北京时间 16:00 / 伦敦时间 08:00 / 纽约时间 03:00）
    - cron: '0 8 * * *'
  workflow_dispatch:
    # 支持手动触发，方便测试

jobs:
  daily-promotion:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # 防止卡死超时

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests praw groq python-telegram-bot

      - name: 🚀 Run daily promotion
        env:
          # AI 密钥（必须）
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # Reddit（可选，新号需先养2周后再启用）
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_SECRET: ${{ secrets.REDDIT_SECRET }}
          REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
          # Telegram（必须）
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_CHANNEL_ES: ${{ secrets.TELEGRAM_CHANNEL_ES }}
          TELEGRAM_CHANNEL_AR: ${{ secrets.TELEGRAM_CHANNEL_AR }}
        run: python scripts/daily_promotion.py

      - name: 📊 Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: promotion-log-${{ github.run_number }}
          path: '*.log'
          if-no-files-found: ignore
          retention-days: 30
