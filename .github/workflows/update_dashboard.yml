name: Update Analytics Dashboard

on:
  schedule:
    # Every 30 minutes
    - cron: '0,30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests

      - name: Generate summary
        run: python analytics_logger.py

      - name: Commit & push analytics data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "BroadFSC Bot"
          git config user.email "bot@broadfsc.com"
          git add analytics/ dashboard.html || true
          git diff --staged --quiet || git commit -m "chore: update analytics dashboard [skip ci]"
          git push https://x-access-token:${GH_TOKEN}@github.com/msli2233bin/broadfsc-automation.git HEAD:main
