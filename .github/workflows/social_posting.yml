name: BroadFSC Cross-Platform Social Posting

on:
  schedule:
    # Morning post: 06:00 UTC (14:00 Beijing = morning US)
    - cron: '0 6 * * *'
    # Evening post: 14:00 UTC (22:00 Beijing = morning APAC next day)
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  social-posting:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests groq Pillow imageio imageio-ffmpeg edge-tts numpy

      - name: Post to X, LinkedIn, Mastodon, Bluesky, LINE (and notify Telegram)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          MASTODON_INSTANCE: ${{ secrets.MASTODON_INSTANCE }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          POSTPROXY_API_KEY: ${{ secrets.POSTPROXY_API_KEY }}
          TIKTOK_MODE: image
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: python social_poster.py

      - name: Post to TikTok (image carousel)
        env:
          POSTPROXY_API_KEY: ${{ secrets.POSTPROXY_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TIKTOK_MODE: image
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: python tiktok_poster.py

      - name: Post to Reddit (if enabled)
        env:
          REDDIT_ENABLED: ${{ secrets.REDDIT_ENABLED }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: python reddit_poster.py

      - name: Post to Substack (Playwright headless, Mon/Wed/Fri only)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 8
          max_attempts: 2
          retry_wait_seconds: 30
        env:
          SUBSTACK_EMAIL: ${{ secrets.SUBSTACK_EMAIL || 'msli2233bin@gmail.com' }}
          SUBSTACK_PASSWORD: ${{ secrets.SUBSTACK_PASSWORD || 'Lin2233509.' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          CI: "true"
        run: |
          pip install playwright
          playwright install chromium --with-deps
          python substack_poster.py

      - name: Commit & push analytics data
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "BroadFSC Bot"
          git config user.email "bot@broadfsc.com"
          git add analytics/ || true
          git diff --staged --quiet || git commit -m "chore(social): sync analytics after posting [skip ci]"
          git push https://x-access-token:${GH_TOKEN}@github.com/msli2233bin/broadfsc-automation.git HEAD:main
