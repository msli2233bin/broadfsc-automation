name: BroadFSC Earnings Tracker

on:
  schedule:
    # Every weekday at 12:00 UTC (20:00 Beijing) — before US market opens
    - cron: '0 12 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  earnings-tracker:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests groq yfinance

      - name: Run earnings tracker
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
        run: python earnings_tracker.py

      - name: Commit & push analytics data
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "BroadFSC Bot"
          git config user.email "bot@broadfsc.com"
          git add analytics/ || true
          git diff --staged --quiet || git commit -m "chore(earnings): sync analytics [skip ci]"
          git push https://x-access-token:${GH_TOKEN}@github.com/msli2233bin/broadfsc-automation.git HEAD:main
